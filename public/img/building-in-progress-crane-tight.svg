<ns0:svg xmlns:ns0="http://www.w3.org/2000/svg" viewBox="60 45 110 125" width="110" height="125" style="color:#9CA3AF" role="img" aria-labelledby="bip-title">
  <ns0:title id="bip-title">More projects are in progress</ns0:title>

  <ns0:style>
    .trolley {
      animation: bip-slide 3.2s cubic-bezier(0.45, 0, 0.55, 1) infinite alternate;
    }
    @keyframes bip-slide {
      from { transform: translateX(0); }
      to   { transform: translateX(45px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .trolley { animation: none; transform: translateX(22px); }
    }
  </ns0:style>

  <ns0:g fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    
    <ns0:line x1="65" y1="165" x2="115" y2="165" />
    
    <ns0:line x1="90" y1="165" x2="90" y2="50" />
    
    <ns0:line x1="90" y1="50" x2="160" y2="50" />
    
    <ns0:line x1="90" y1="50" x2="68" y2="58" />
    
    <ns0:line x1="90" y1="70" x2="125" y2="50" />
  </ns0:g>

  <ns0:g class="trolley">
    <ns0:line x1="108" y1="50" x2="108" y2="84" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
    <ns0:rect x="102" y="84" width="12" height="12" rx="1.5" fill="currentColor" />
  </ns0:g>
</ns0:svg>